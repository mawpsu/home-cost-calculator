<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CT Home Cost Calculator V4</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  margin: 0;
  background: #f6f7fb;
  color: #1c2430;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 16px;
}

h1 {
  font-size: 26px;
  margin-bottom: 10px;
}

.card {
  background: white;
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 12px;
}

.row {
  display: flex;
  justify-content: space-between;
  margin: 6px 0;
}

input {
  width: 100%;
  padding: 8px;
  margin-top: 4px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

select {
  width: 100%;
  padding: 8px;
  margin-top: 4px;
}

.total {
  font-size: 22px;
  font-weight: bold;
}

.section-title {
  font-weight: 600;
  margin-top: 10px;
}
</style>
</head>

<body>
<div class="container">

<h1>CT Home Cost Calculator V4</h1>

<div class="card">
<label>Monthly Income</label>
<input id="income" type="number" value="8000">
</div>

<div class="card">
<label>Groceries Household Type</label>
<select id="groceries">
  <option value="700">Couple ($700)</option>
  <option value="900" selected>Couple + Infant ($900)</option>
  <option value="1000">Couple + Child ($1000)</option>
  <option value="1200">Couple + Infant + Child ($1200)</option>
</select>
</div>

<div class="card">
<div class="section-title">House Costs</div>

<div class="row"><span>Mortgage P&I</span><input id="pi" value="2557"></div>
<div class="row"><span>PMI</span><input id="pmi" value="120"></div>
<div class="row"><span>Property Taxes</span><input id="tax" value="500"></div>
<div class="row"><span>Insurance</span><input id="ins" value="150"></div>
<div class="row"><span>HOA</span><input id="hoa" value="0"></div>
<div class="row"><span>Water/Sewer/Trash</span><input id="water" value="135"></div>
<div class="row"><span>Electric</span><input id="elec" value="172"></div>
<div class="row"><span>Cooling</span><input id="cool" value="56"></div>
<div class="row"><span>Heating</span><input id="heat" value="274"></div>
<div class="row"><span>Lawn</span><input id="lawn" value="46"></div>
<div class="row"><span>Snow</span><input id="snow" value="36"></div>
</div>

<div class="card">
<div class="section-title">Other Costs</div>

<div class="row"><span>Car Insurance</span><input id="car" value="253.71"></div>
<div class="row"><span>Cell Phone</span><input id="phone" value="222.44"></div>
<div class="row"><span>Streaming + Internet</span><input id="stream" value="292"></div>
<div class="row"><span>Fitness</span><input id="fitness" value="322"></div>
<div class="row"><span>Groceries</span><span id="groceryDisplay">$900</span></div>
<div class="row"><span>Security</span><input id="security" value="40"></div>

</div>

<div class="card">
<div class="section-title">Results</div>

<div class="row"><span>House Costs</span><span id="houseTotal">$0</span></div>
<div class="row"><span>Other Costs</span><span id="otherTotal">$0</span></div>
<div class="row total"><span>Total Monthly</span><span id="total">$0</span></div>
<div class="row"><span>Leftover</span><span id="leftover">$0</span></div>

</div>

</div>

<script>
function calc() {
  let house =
    +pi.value + +pmi.value + +tax.value + +ins.value + +hoa.value +
    +water.value + +elec.value + +cool.value + +heat.value +
    +lawn.value + +snow.value;

  let groceriesVal = +groceries.value;

  let other =
    +car.value + +phone.value + +stream.value + +fitness.value +
    groceriesVal + +security.value;

  houseTotal.innerText = "$" + house.toFixed(0);
  otherTotal.innerText = "$" + other.toFixed(0);

  let total = house + other;
  document.getElementById("total").innerText = "$" + total.toFixed(0);

  let leftover = +income.value - total;
  document.getElementById("leftover").innerText = "$" + leftover.toFixed(0);

  groceryDisplay.innerText = "$" + groceriesVal;
}

document.querySelectorAll("input, select").forEach(el => {
  el.addEventListener("input", calc);
});

calc();
</script>

</body>
</html>
